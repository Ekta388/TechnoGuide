server {
    listen 80;
    server_name _; # Replace with your VPN IP or private domain

    # Frontend Static Files
    location / {
        root /var/www/technoguide/frontend/build;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WhatsApp QR Code / Status Proxy
    location /api/whatsapp/status {
        proxy_pass http://localhost:5000/api/whatsapp/status;
        proxy_set_header Host $host;
    }

    # Security: Restrict access to Tailscale VPN range (optional but recommended)
    # allow 100.64.0.0/10; 
    # deny all;
}
